<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Dodawanie i usuwanie elementów</title>

  <style>
    #container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .box {
      padding: 10px 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="button"] {
      padding: 6px 12px;
      background: #ff6a4d;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="container">
    <div class="box">
      strong
      <input type="button" value="Usuń">
    </div>
    <div class="box">
      strong
      <input type="button" value="Usuń">
    </div>
  </div>

  <input type="button" id="addBtn" value="Wstaw element">

  <script>
    const container = document.getElementById("container");
    const addBtn = document.getElementById("addBtn");

    let counter = 1;

    function randomColor() {
      return `hsl(${Math.random() * 360}, 70%, 70%)`;
    }

    function createBox(text) {
      const div = document.createElement("div");
      div.className = "box";
      div.style.backgroundColor = randomColor();

      const span = document.createElement("span");
      span.textContent = text;

      const removeBtn = document.createElement("input");
      removeBtn.type = "button";
      removeBtn.value = "Usuń";

      removeBtn.addEventListener("click", () => {
        div.remove();
      });

      div.appendChild(span);
      div.appendChild(removeBtn);

      return div;
    }

    // usuwanie dla istniejących elementów
    document.querySelectorAll(".box input").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.target.parentElement.remove();
      });
    });

    addBtn.addEventListener("click", () => {
      const box = createBox(`Nowy ${counter}`);
      container.appendChild(box);
      counter++;
    });
  </script>

</body>
</html>
