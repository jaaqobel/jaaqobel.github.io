<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Prosta strona DOM</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            transition: background-color 0.3s;
        }

        button {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h1 id="naglowek">JAAQOBEl</h1>

    <p id="tekst">Zmiana tekstu</p>
    <button id="btnTekst">Zmień tekst</button>

    <br><br>

    <input type="text" id="imie" placeholder="Wpisz imię">
    <button id="btnImie">Wyświetlanie wpisanego tekstu </button>

    <p id="wynik"></p>

    <button id="btnKolor">Zmień kolor tła</button>

    <script>
        // ===== ZMIANA TEKSTU (toggle) =====
        const tekst = document.getElementById("tekst");
        const btnTekst = document.getElementById("btnTekst");

        let tekstZmieniony = false;
        const oryginalnyTekst = tekst.textContent;

        btnTekst.addEventListener("click", function () {
            if (!tekstZmieniony) {
                tekst.textContent = "Tekst został zmieniony!";
                btnTekst.textContent = "Cofnij tekst";
            } else {
                tekst.textContent = oryginalnyTekst;
                btnTekst.textContent = "Zmień tekst";
            }
            tekstZmieniony = !tekstZmieniony;
        });

        // ===== POKAZYWANIE IMIENIA (toggle) =====
        const inputImie = document.getElementById("imie");
        const btnImie = document.getElementById("btnImie");
        const wynik = document.getElementById("wynik");

        let imieWidoczne = false;

        btnImie.addEventListener("click", function () {
            if (!imieWidoczne) {
                wynik.textContent = "Cześć " + inputImie.value + "!";
                btnImie.textContent = "Cofnij";
            } else {
                wynik.textContent = "";
                inputImie.value = "";
                btnImie.textContent = "Pokaż imię";
            }
            imieWidoczne = !imieWidoczne;
        });

        // ===== KOLOR TŁA (toggle) =====
        const btnKolor = document.getElementById("btnKolor");
        const oryginalnyKolor = document.body.style.backgroundColor;
        let kolorZmieniony = false;

        btnKolor.addEventListener("click", function () {
            if (!kolorZmieniony) {
                document.body.style.backgroundColor =
                    "#" + Math.floor(Math.random() * 16777215).toString(16);
                btnKolor.textContent = "Cofnij kolor";
            } else {
                document.body.style.backgroundColor = oryginalnyKolor;
                btnKolor.textContent = "Zmień kolor tła";
            }
            kolorZmieniony = !kolorZmieniony;
        });
    </script>

    <div>
    </div>
    <strong>strong</strong>
    <strong>strong</strong>
    <div class="element" style="background: rgb(110, 247, 229); color: rgb(51, 51, 51);">Nowy 1</div>
    </div>
    <script>
        let counter = 0;

const el = document.createElement("div");
el.classList.add("element");
el.style.background = `hsl(${Math.random()*360}, 90%, 70%)`;
el.style.color = "#333";
el.innerText = `Nowy ${++counter}`;

const div = document.querySelector(".test-cnt");
div.appendChild(el);
    </script>
</body>
</html>
