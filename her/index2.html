<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Serce dla Niej - Diament</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #05000a;
            font-family: 'Courier New', Courier, monospace;
        }
        
        #text-container {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: #ffccda;
            font-size: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="text-container">this is for you my love</div>

    <script>
        // 1. SCENA, KAMERA, RENDERER
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x05000a, 0.015); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 45; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- NOWOŚĆ: ŚWIATŁA ---
        // Diament potrzebuje światła, żeby jego krawędzie błyszczały
        const ambientLight = new THREE.AmbientLight(0x404040, 2); // Delikatne światło tła
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0xffffff, 2, 100);
        pointLight1.position.set(20, 20, 20); // Główne białe światło z góry
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff0066, 2, 100);
        pointLight2.position.set(-20, -20, 20); // Różowe światło z dołu (daje refleksy)
        scene.add(pointLight2);

        // 2. ZEWNĘTRZNE SERCE Z CZĄSTECZEK (Particles)
        const particleCount = 8000; 
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorChoices = [
            new THREE.Color('#ff0044'),
            new THREE.Color('#ff4d79'),
            new THREE.Color('#ff99b3'),
            new THREE.Color('#ffffff')  
        ];

        for (let i = 0; i < particleCount; i++) {
            const t = Math.PI * 2 * Math.random(); 
            
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            let z = (Math.random() - 0.5) * 8; 

            const spread = Math.random() * 1.5;
            x += (Math.random() - 0.5) * spread;
            y += (Math.random() - 0.5) * spread;

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            const color = colorChoices[Math.floor(Math.random() * colorChoices.length)];
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.4,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.9,
            depthWrite: false
        });

        const particles = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particles);

        // 3. --- NOWOŚĆ: ŚRODKOWY DIAMENT (Custom Geometry) ---
        
        // Rysujemy dwuwymiarowy kształt serca
        const x = 0, y = 0;
        const heartShape = new THREE.Shape();
        heartShape.moveTo( x + 5, y + 5 );
        heartShape.bezierCurveTo( x + 5, y + 5, x + 4, y, x, y );
        heartShape.bezierCurveTo( x - 6, y, x - 6, y + 7,x - 6, y + 7 );
        heartShape.bezierCurveTo( x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19 );
        heartShape.bezierCurveTo( x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7 );
        heartShape.bezierCurveTo( x + 16, y + 7, x + 16, y, x + 10, y );
        heartShape.bezierCurveTo( x + 7, y, x + 5, y + 5, x + 5, y + 5 );

        // Ustawienia wytłaczania (tworzenie 3D z 2D)
        const extrudeSettings = {
            depth: 3,           // Grubość serca
            bevelEnabled: true, // Ścięte krawędzie (ważne dla diamentu!)
            bevelSegments: 2,   // Ilość "szlifów" na krawędziach
            steps: 1,
            bevelSize: 2,
            bevelThickness: 2,
            curveSegments: 3    // NISKA WARTOŚĆ - tworzy efekt kanciastych "low-poly" ścianek
        };

        const diamondGeometry = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
        diamondGeometry.center(); // Wyśrodkowanie osi obrotu
        diamondGeometry.scale(0.25, 0.25, 0.25); // Dopasowanie rozmiaru
        diamondGeometry.rotateZ(Math.PI); // Obrót o 180 stopni (Shape rysuje się do góry nogami)

        // Materiał fizyczny imitujący różowe szkło/diament
        const diamondMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xff1493,        // Różowy kolor podstawowy
            emissive: 0x4a0018,     // Delikatne wewnętrzne świecenie
            roughness: 0.1,         // Bardzo gładka powierzchnia
            metalness: 0.4,         // Leciutko metaliczne dla ostrych odblasków światła
            transmission: 0.6,      // Przepuszczanie światła (efekt szkła)
            thickness: 1.0,
            flatShading: true,      // KRYTYCZNE: sprawia, że każda ścianka odbija światło osobno (efekt kryształu)
            side: THREE.DoubleSide
        });

        const coreDiamond = new THREE.Mesh(diamondGeometry, diamondMaterial);
        scene.add(coreDiamond);

        // 4. ANIMACJA PĘTLI
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.03; 

            // Obrót cząsteczek
            particles.rotation.y = Math.sin(time * 0.2) * 0.5; 
            particles.rotation.z = Math.sin(time * 0.1) * 0.1; 

            // Efekt pulsującego bicia serca
            const heartbeat = 1 + Math.pow(Math.sin(time * 2.5), 6) * 0.15;
            particles.scale.set(heartbeat, heartbeat, heartbeat);

            // --- ANIMACJA DIAMENTU ---
            // Diament kręci się wkoło własnej osi
            coreDiamond.rotation.y += 0.02;
            coreDiamond.rotation.x = Math.sin(time * 0.5) * 0.2; // Lekko się kiwa
            // Diament też pulsuje w rytm uderzeń serca
            coreDiamond.scale.set(heartbeat, heartbeat, heartbeat);

            renderer.render(scene, camera);
        }

        animate();

        // 5. OBSŁUGA ROZMIARU OKNA
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
