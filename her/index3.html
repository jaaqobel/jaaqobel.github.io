<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmiczne Serce i Galaktyka GIF-ów</title>
    <style>
        /* Stylizacja całej strony - czarne tło, brak pasków przewijania */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        /* Kontener na trójwymiarową scenę */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Warstwa HTML nakładana na przestrzeń 3D (dla ruchomych GIF-ów) */
        #dom-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Pozwala na obracanie kamerą "przez" obrazki */
            z-index: 2;
        }

        /* Styl dla krążących okrągłych GIF-ów/obrazków */
        .galaxy-gif {
            position: absolute;
            width: 250px;  /* Szerokość obrazka */
            height: 250px; /* Wysokość obrazka */
            border-radius: 50%; /* Tworzy idealne kółko */
            border: 3px solid rgba(255, 105, 180, 0.6); /* Różowa, lekko świecąca ramka */
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.8); /* Efekt neonu */
            object-fit: cover;
            transform: translate(-50%, -50%); /* Środkowanie punktu pozycjonowania */
            transition: width 0.2s, height 0.2s;
            pointer-events: auto; /* Pozwala na klikanie lub najeżdżanie na gify */
        }

        /* Efekt powiększenia po najechaniu myszką na GIF */
        .galaxy-gif:hover {
            width: 500px;
            height: 500px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="dom-overlay"></div>

    <script>
        // =========================================================================
        //  TUTAJ MOŻESZ ZMIENIĆ LINKI DO SWOICH GIF-ÓW / OBRAZKÓW (GIF_A do GIF_F)
        // =========================================================================
        const GIF_SOURCES = {
            GIF_A: "GIF_A.gif",
            GIF_B: "GIF_B.gif", 
            GIF_C: "GIF_C.gif", 
            GIF_D: "GIF_D.gif",
            GIF_E: "GIF_E.gif", 
            GIF_F: "GIF_F.gif"  
        };
        // =========================================================================

        // --- 1. INICJALIZACJA SCENY 3D ---
        const container = document.getElementById('canvas-container');
        const overlay = document.getElementById('dom-overlay');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Ustawienie kamery pod lekkim kątem z góry, aby widzieć strukturę 3D
        camera.position.set(0, 25, 45);
        camera.lookAt(0, 0, 0);

        // Wspólna tekstura dla cząsteczek (miękka, świecąca kropka)
        function createGlowTexture(colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }
        const glowTexture = createGlowTexture();

        // --- 2. TWORZENIE GALAKTYKI SPIRALNEJ WOKÓŁ ---
        const galaxyCount = 12000; // Liczba gwiazd w galaktyce
        const galaxyGeometry = new THREE.BufferGeometry();
        const galaxyPositions = new Float32Array(galaxyCount * 3);
        const galaxyColors = new Float32Array(galaxyCount * 3);

        const arms = 3; // Liczba ramion spiralnych galaktyki
        const galaxyRadius = 40; // Jak szeroka jest galaktyka

        for (let i = 0; i < galaxyCount; i++) {
            const r = Math.random() * galaxyRadius;
            // Kąt spirali zależy od odległości od środka (r)
            const armAngle = ((i % arms) / arms) * Math.PI * 2;
            const spiralAngle = r * 0.3; 
            const angle = armAngle + spiralAngle + (Math.random() - 0.5) * 0.4;

            // Rozrzut w pionie (im bliżej centrum, tym grubszy dysk)
            const randomY = (Math.random() - 0.5) * Math.random() * (galaxyRadius - r) * 0.15;

            galaxyPositions[i * 3] = Math.cos(angle) * r;
            galaxyPositions[i * 3 + 1] = randomY;
            galaxyPositions[i * 3 + 2] = Math.sin(angle) * r;

            // Kolory gwiazd galaktyki: od fioletu/różu w centrum do błękitu na zewnątrz
            const mixedColor = new THREE.Color('#ff007f');
            if (r > galaxyRadius * 0.4) {
                mixedColor.lerp(new THREE.Color('#00ffff'), (r / galaxyRadius));
            }
            galaxyColors[i * 3] = mixedColor.r;
            galaxyColors[i * 3 + 1] = mixedColor.g;
            galaxyColors[i * 3 + 2] = mixedColor.b;
        }

        galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(galaxyPositions, 3));
        galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));

        const galaxyMaterial = new THREE.PointsMaterial({
            size: 0.25,
            map: glowTexture,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial);
        scene.add(galaxy);


        // --- 3. TWORZENIE PULSUJĄCEGO SERCA W CENTRUM ---
        const heartCount = 3500; // Liczba cząsteczek w sercu
        const heartGeometry = new THREE.BufferGeometry();
        const heartPositions = new Float32Array(heartCount * 3);

        for (let i = 0; i < heartCount; i++) {
            const t = Math.random() * Math.PI * 2;
            
            // Parametryczny wzór na serce 3D
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const z = (Math.random() - 0.5) * 6; // Grubość serca

            const scale = 0.45; // Dopasowanie rozmiaru serca do wnętrza galaktyki
            heartPositions[i * 3] = x * scale;
            // Obracamy serce do pionu (w osi Y), aby stało dumnie w centrum galaktyki
            heartPositions[i * 3 + 1] = y * scale + 2; 
            heartPositions[i * 3 + 2] = z * scale;
        }

        heartGeometry.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));

        const heartMaterial = new THREE.PointsMaterial({
            color: 0xff1493, // Intensywny różowy neon
            size: 0.4,
            map: glowTexture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const heart = new THREE.Points(heartGeometry, heartMaterial);
        // Podnosimy lekko serce i pochylamy ku kamerze
        heart.rotation.x = -0.2; 
        scene.add(heart);


        // --- 4. PRZYGOTOWANIE GIF-ÓW / ELEMENTÓW ORBITUJĄCYCH ---
        // Tworzymy niewidzialne punkty 3D (kotwice), które będą krążyć w przestrzeni 3D
        const gifObjects = [];
        const gifElements = [];
        const gifKeys = Object.keys(GIF_SOURCES);

        gifKeys.forEach((key, index) => {
            // Tworzenie elementu <img> w HTML dla każdego GIF-a
            const img = document.createElement('img');
            img.src = GIF_SOURCES[key];
            img.className = 'galaxy-gif';
            img.alt = key;
            overlay.appendChild(img);
            gifElements.push(img);

            // Tworzenie powiązanego wirtualnego punktu w przestrzeni 3D
            const dummyObject = new THREE.Object3D();
            
            // Każdy GIF dostaje osobną odległość (promień orbity) i inny kąt startowy
            dummyObject.userData = {
                radius: 12 + index * 4,       // Promień orbity wokół serca
                speed: 0.008 - index * 0.001,  // Prędkość poruszania się
                angle: (index / gifKeys.length) * Math.PI * 2, // Kąt rozłożenia na okręgu
                heightOffset: (Math.random() - 0.5) * 4 // Lekkie przesunięcie góra/dół
            };
            
            scene.add(dummyObject);
            gifObjects.push(dummyObject);
        });


        // --- 5. GŁÓWNA PĘTLA ANIMACJI (RENDEROWANIE) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // Wolny obrót całej galaktyki gwiazd
            galaxy.rotation.y = time * 0.05;

            // Efekt bicia / tętnienia serca w centrum
            const pulse = 1.0 + Math.sin(time * 4) * 0.07;
            heart.scale.set(pulse, pulse, pulse);
            // Delikatne kołysanie serca
            heart.rotation.y = Math.sin(time * 0.5) * 0.2;

            // Aktualizacja pozycji wirtualnych punktów oraz dopasowanie pozycji ikon HTML
            gifObjects.forEach((obj, i) => {
                // Obliczanie nowej pozycji na orbicie kołowej
                obj.userData.angle += obj.userData.speed;
                
                const x = Math.cos(obj.userData.angle) * obj.userData.radius;
                const z = Math.sin(obj.userData.angle) * obj.userData.radius;
                const y = Math.sin(time + i) * 1.5 + obj.userData.heightOffset; // Falowanie góra/dół

                obj.position.set(x, y, z);

                // Przeliczenie pozycji 3D w przestrzeni na piksele 2D na ekranie komputera
                const wp = new THREE.Vector3();
                obj.getWorldPosition(wp);
                wp.project(camera);

                // Sprawdzenie czy obiekt nie znajduje się za kamerą
                if(wp.z < 1) {
                    // Zamiana współrzędnych WebGL (-1 do 1) na piksele ekranowe
                    const screenX = (wp.x * .5 + .5) * window.innerWidth;
                    const screenY = (-(wp.y * .5) + .5) * window.innerHeight;

                    // Przypisanie pozycji do obrazka HTML
                    gifElements[i].style.left = `${screenX}px`;
                    gifElements[i].style.top = `${screenY}px`;
                    gifElements[i].style.display = 'block';

                    // Efekt głębi: im dalej w tle jest GIF, tym jest mniejszy i bardziej przezroczysty
                    const depthScale = Math.max(0.3, (1 - wp.z) * 1.5);
                    gifElements[i].style.transform = `translate(-50%, -50%) scale(${depthScale})`;
                    gifElements[i].style.opacity = Math.min(1, depthScale + 0.2);
                    
                    // Zarządzanie warstwami (z-index) - te z przodu przykrywają te z tyłu
                    gifElements[i].style.zIndex = Math.floor((1 - wp.z) * 100) + 10;
                } else {
                    gifElements[i].style.display = 'none';
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        // --- 6. DOPASOWANIE DO ROZMIARU OKNA (RESIZE) ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
