<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyraźne Serce z Tekstu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Funkcja obliczająca pozycję na kształcie serca
        function heartShape(t, scale = 15) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * scale, y: y * scale };
        }

        let offset = 0; 
        // ZMIANA: Dużo spacji na końcu, aby wyraźnie oddzielić od siebie kolejne zdania
        const text = "I love you          "; 

        function animate() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // ZMIANA: Znacznie większa i grubsza czcionka
            ctx.font = "bold 20px 'Courier New', monospace";
            ctx.fillStyle = "#ff0033";
            ctx.shadowBlur = 4;
            ctx.shadowColor = "#ff0033";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // ZMIANA: Mniej warstw (3 zamiast 4) i większe odstępy między nimi
            const scales = [11, 15, 19];

            scales.forEach((scale, index) => {
                // ZMIANA: Znacznie mniejsza liczba fraz na jednej linii, aby litery się nie sklejały
                const numPhrases = 14 + index * 4; 

                for (let i = 0; i < numPhrases; i++) {
                    const t = (i / numPhrases) * Math.PI * 2 + offset;

                    const p1 = heartShape(t, scale);
                    const p2 = heartShape(t + 0.01, scale); 

                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

                    ctx.save();
                    ctx.translate(cx + p1.x, cy + p1.y);
                    ctx.rotate(angle);
                    ctx.fillText(text, 0, 0);
                    ctx.restore();
                }
            });

            offset -= 0.003; 

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
